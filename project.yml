name: Freeletics
options:
  bundleIdPrefix: com.freeletics
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Freeletics/Resources/Info.plist
    DEVELOPMENT_TEAM: ""
targets:
  Freeletics:
    type: application
    platform: iOS
    sources:
      - Freeletics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeletics.app
        INFOPLIST_FILE: Freeletics/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Freeletics/Resources/Freeletics.entitlements
    entitlements:
      path: Freeletics/Resources/Freeletics.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
  FreeleticsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FreeleticsTests
    dependencies:
      - target: Freeletics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeletics.tests
