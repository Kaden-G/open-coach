name: OpenCoach
options:
  bundleIdPrefix: com.open-coach
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: OpenCoach/Resources/Info.plist
    DEVELOPMENT_TEAM: ""
targets:
  OpenCoach:
    type: application
    platform: iOS
    sources:
      - OpenCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.open-coach.app
        INFOPLIST_FILE: OpenCoach/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenCoach/Resources/OpenCoach.entitlements
    entitlements:
      path: OpenCoach/Resources/OpenCoach.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
  OpenCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OpenCoachTests
    dependencies:
      - target: OpenCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.open-coach.tests
